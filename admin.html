<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Nexus Learning</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e88e5;
            --secondary: #455a64;
            --accent: #0d47a1;
            --dark: #1a1a2e;
            --darker: #0f0f1e;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(30, 136, 229, 0.1);
            border: 1px solid rgba(30, 136, 229, 0.3);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        input, select {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(30, 136, 229, 0.3);
            color: #fff;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: #fff;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(30, 136, 229, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 30px;
        }

        thead {
            background: rgba(30, 136, 229, 0.2);
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 1px solid rgba(30, 136, 229, 0.3);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(30, 136, 229, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-google {
            background: rgba(66, 133, 244, 0.2);
            color: #42a5f5;
        }

        .badge-manual {
            background: rgba(38, 166, 154, 0.2);
            color: #26a69a;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff0000;
            padding: 20px;
            border-radius: 10px;
            color: #ff6b6b;
            margin-top: 20px;
        }

        .success {
            background: rgba(38, 166, 154, 0.1);
            border: 1px solid #26a69a;
            padding: 20px;
            border-radius: 10px;
            color: #26a69a;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Admin Panel - Nexus Learning</h1>
            <p>Base de Datos PostgreSQL (Supabase)</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Total Usuarios</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="googleUsers">0</div>
                <div class="stat-label">Login Google</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="manualUsers">0</div>
                <div class="stat-label">Login Manual</div>
            </div>
        </div>

        <div id="successMsg" class="success" style="display: none;"></div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Buscar por nombre o email...">
            <select id="filterMethod">
                <option value="">Filtrar por método...</option>
                <option value="google">Google</option>
                <option value="manual">Manual</option>
            </select>
            <button onclick="loadUsers()">🔄 Actualizar</button>
            <button onclick="exportToCSV()">📥 Exportar CSV</button>
        </div>

        <div id="loading" class="loading">Cargando datos...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <table id="usersTable" style="display: none;">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Método Login</th>
                    <th>Fecha Registro</th>
                    <th>Último Acceso</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
            </tbody>
        </table>
    </div>

    <script>
        // ⚠️ ACTUALIZA ESTAS CREDENCIALES CON LAS TUYAS
        const SUPABASE_URL = 'https://tu-proyecto.supabase.co';
        const SUPABASE_KEY = 'tu-anon-key';
        
        let supabase = null;
        let allUsers = [];

        // Inicializar Supabase
        try {
            const { createClient } = window.supabase;
            supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Supabase conectado');
            loadUsers();
        } catch (error) {
            showError('Error: No se pudo conectar a Supabase. Verifica las credenciales.');
            console.error(error);
        }

        // Cargar usuarios
        async function loadUsers() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('usersTable').style.display = 'none';

                const { data, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .order('fecha_registro', { ascending: false });

                if (error) throw error;

                allUsers = data || [];
                updateStats();
                displayUsers(allUsers);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersTable').style.display = 'table';
                
                if (allUsers.length > 0) {
                    showSuccess(`✅ ${allUsers.length} usuario(s) cargado(s)`);
                }
            } catch (error) {
                showError('Error al cargar usuarios: ' + error.message);
                console.error(error);
            }
        }

        // Actualizar estadísticas
        function updateStats() {
            const total = allUsers.length;
            const google = allUsers.filter(u => u.metodo_login === 'google').length;
            const manual = allUsers.filter(u => u.metodo_login === 'manual').length;

            document.getElementById('totalUsers').textContent = total;
            document.getElementById('googleUsers').textContent = google;
            document.getElementById('manualUsers').textContent = manual;
        }

        // Mostrar usuarios
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Sin usuarios aún</td></tr>';
                return;
            }

            users.forEach(user => {
                const row = document.createElement('tr');
                const badgeClass = user.metodo_login === 'google' ? 'badge-google' : 'badge-manual';
                const methodLabel = user.metodo_login === 'google' ? 'Google' : 'Manual';
                const fechaRegistro = new Date(user.fecha_registro).toLocaleString('es-ES');
                const ultimoAcceso = new Date(user.ultimo_acceso).toLocaleString('es-ES');

                row.innerHTML = `
                    <td>${user.nombre}</td>
                    <td>${user.email}</td>
                    <td><span class="badge ${badgeClass}">${methodLabel}</span></td>
                    <td>${fechaRegistro}</td>
                    <td>${ultimoAcceso}</td>
                    <td><span style="color: #26a69a;">●</span> ${user.estado}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Búsqueda
        document.getElementById('searchInput').addEventListener('keyup', filterUsers);
        document.getElementById('filterMethod').addEventListener('change', filterUsers);

        function filterUsers() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const methodFilter = document.getElementById('filterMethod').value;

            let filtered = allUsers.filter(user => {
                const matchSearch = !searchText || 
                    user.nombre.toLowerCase().includes(searchText) || 
                    user.email.toLowerCase().includes(searchText);
                
                const matchMethod = !methodFilter || user.metodo_login === methodFilter;
                
                return matchSearch && matchMethod;
            });

            displayUsers(filtered);
        }

        // Exportar a CSV
        function exportToCSV() {
            let csv = 'Nombre,Email,Método,Fecha Registro,Último Acceso,Estado\n';
            
            allUsers.forEach(user => {
                const fechaRegistro = new Date(user.fecha_registro).toLocaleString('es-ES');
                const ultimoAcceso = new Date(user.ultimo_acceso).toLocaleString('es-ES');
                csv += `"${user.nombre}","${user.email}","${user.metodo_login}","${fechaRegistro}","${ultimoAcceso}","${user.estado}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.setAttribute('href', URL.createObjectURL(blob));
            link.setAttribute('download', `usuarios_nexus_${new Date().toISOString().split('T')[0]}.csv`);
            link.click();
        }

        // Mostrar error
        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').style.display = 'block';
        }

        // Mostrar éxito
        function showSuccess(message) {
            const msg = document.getElementById('successMsg');
            msg.textContent = message;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
