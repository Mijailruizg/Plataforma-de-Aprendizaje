<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Nexus Learning</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e88e5;
            --secondary: #455a64;
            --accent: #0d47a1;
            --dark: #1a1a2e;
            --darker: #0f0f1e;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(30, 136, 229, 0.1);
            border: 1px solid rgba(30, 136, 229, 0.3);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 30px;
        }

        thead {
            background: rgba(30, 136, 229, 0.2);
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 1px solid rgba(30, 136, 229, 0.3);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(30, 136, 229, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-google {
            background: rgba(66, 133, 244, 0.2);
            color: #42a5f5;
            border: 1px solid #42a5f5;
        }

        .badge-manual {
            background: rgba(38, 166, 154, 0.2);
            color: #26a69a;
            border: 1px solid #26a69a;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff0000;
            padding: 20px;
            border-radius: 10px;
            color: #ff6b6b;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: #fff;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(30, 136, 229, 0.3);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 1px solid rgba(30, 136, 229, 0.3);
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: #fff;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Panel Admin - Nexus Learning</h1>
            <p>Dashboard de Usuarios Registrados</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Total de Usuarios</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="googleUsers">0</div>
                <div class="stat-label">Registros Google</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="manualUsers">0</div>
                <div class="stat-label">Registros Manuales</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterUsers('all')">Todos</button>
            <button class="filter-btn" onclick="filterUsers('google')">Google</button>
            <button class="filter-btn" onclick="filterUsers('manual')">Manual</button>
            <button onclick="exportToCSV()">📥 Exportar CSV</button>
        </div>

        <div id="loading" class="loading">Cargando datos...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <table id="usersTable" style="display: none;">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Método</th>
                    <th>Fecha de Registro</th>
                    <th>Último Acceso</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
            </tbody>
        </table>
    </div>

    <script>
        // Configuración Firebase (actualiza con tus credenciales)
        const firebaseConfig = {
            apiKey: "AIzaSyC4R6vK7xJ2nQ8mP3lW5dY9kA0bB1cC2e",
            authDomain: "nexus-learning-app.firebaseapp.com",
            projectId: "nexus-learning-app",
            storageBucket: "nexus-learning-app.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef1234567890"
        };

        let db = null;
        let allUsers = [];
        let currentFilter = 'all';

        // Inicializar Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            loadUsers();
        } catch (error) {
            showError('Firebase no disponible. Verifica tu configuración.');
            console.error('Firebase error:', error);
        }

        // Cargar usuarios desde Firestore
        async function loadUsers() {
            try {
                const snapshot = await db.collection('users').orderBy('timestamp', 'desc').get();
                allUsers = [];
                
                snapshot.forEach(doc => {
                    allUsers.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });

                updateStats();
                displayUsers(allUsers);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('usersTable').style.display = 'table';
            } catch (error) {
                showError('Error al cargar usuarios: ' + error.message);
                console.error('Error:', error);
            }
        }

        // Actualizar estadísticas
        function updateStats() {
            const total = allUsers.length;
            const google = allUsers.filter(u => u.loginMethod === 'google').length;
            const manual = allUsers.filter(u => u.loginMethod === 'manual').length;

            document.getElementById('totalUsers').textContent = total;
            document.getElementById('googleUsers').textContent = google;
            document.getElementById('manualUsers').textContent = manual;
        }

        // Mostrar usuarios
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Sin usuarios aún</td></tr>';
                return;
            }

            users.forEach(user => {
                const row = document.createElement('tr');
                const timestamp = user.timestamp ? new Date(user.timestamp.toDate()).toLocaleString('es-ES') : 'N/A';
                const lastLogin = user.lastLogin ? new Date(user.lastLogin.toDate()).toLocaleString('es-ES') : 'N/A';
                const badgeClass = user.loginMethod === 'google' ? 'badge-google' : 'badge-manual';
                const methodLabel = user.loginMethod === 'google' ? 'Google' : 'Manual';

                row.innerHTML = `
                    <td><strong>${user.name || 'N/A'}</strong></td>
                    <td>${user.email || 'N/A'}</td>
                    <td><span class="badge ${badgeClass}">${methodLabel}</span></td>
                    <td>${timestamp}</td>
                    <td>${lastLogin}</td>
                    <td><span style="color: #26a69a; font-weight: 600;">${user.status || 'active'}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        // Filtrar usuarios
        function filterUsers(method) {
            currentFilter = method;
            
            // Actualizar botones
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filtrar y mostrar
            if (method === 'all') {
                displayUsers(allUsers);
            } else {
                const filtered = allUsers.filter(u => u.loginMethod === method);
                displayUsers(filtered);
            }
        }

        // Exportar a CSV
        function exportToCSV() {
            let csv = 'Nombre,Email,Método,Fecha de Registro,Último Acceso,Estado\n';
            
            (currentFilter === 'all' ? allUsers : allUsers.filter(u => u.loginMethod === currentFilter)).forEach(user => {
                const timestamp = user.timestamp ? new Date(user.timestamp.toDate()).toLocaleString('es-ES') : 'N/A';
                const lastLogin = user.lastLogin ? new Date(user.lastLogin.toDate()).toLocaleString('es-ES') : 'N/A';
                
                csv += `"${user.name}","${user.email}","${user.loginMethod}","${timestamp}","${lastLogin}","${user.status}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'usuarios_nexus_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
        }

        // Mostrar errores
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
